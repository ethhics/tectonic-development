# spec: tectonic/spec-format
kind: feature
status: proposed
parent: tectonic/methodology
provenance:
  - survey of existing spec formats
publishes:
  - tectonic/spec-format-reference (v0)

intent:
  - claim: A specification format exists that treats a spec as
      layered plates — intent, context, constraints, verification,
      plan — with honest mechanisms for origin, enforcement, and
      uncertainty.

  - claim: The format supports composition across scope (containment,
      sutures, policy, utilities) and graded propagation (dirty vs
      notified) when the graph changes.

  - claim: The format admits thin specs. A three-line canonical spec
      is legal.

context:
  - fact: The format is defined in the published spec-format-reference artifact.
    guaranteed_by: tectonic/methodology
    enforcement: convention

  - fact: Implementations (parsers, renderers, dirty-propagation
      tooling) do not yet exist.
    guaranteed_by: given
    enforcement: none
    note:
      kind: limitation
      detail: The format describes a structure that humans can
        author and review but machines cannot yet validate. A
        spec-level "type system" is an open question.

constraints:
  local:
    - directive: Every structural addition must be justified by a
        real failure mode in a real example, not by anticipated need.
      note:
        kind: trade-off
        detail: Risks being too reactive; may miss additions that
          would prevent problems we haven't hit yet. Accepted
          because the alternative (speculative structure) has
          historically killed spec methodologies.

    - directive: The format must distinguish structural content
        (what a spec contains) from procedural content (what happens
        between specs over time). Procedural primitives are explicit
        when named.
      certainty: working-assumption
      note:
        kind: deferred-decision
        detail: Emerged in the second round of stress-testing. The
          distinction may want its own section in the methodology
          once more procedural primitives land.

verification:
  - claim: The format has been tested against meaningfully different
      examples (in-process tool with siblings and utility; published
      API with external consumers; self-description).
    grade: reviewable
    review: on each new stress-test example

  - claim: Every field in the format earns its place by resolving a
      failure mode some earlier version couldn't express.
    grade: reviewable
    review: on each format revision

  - claim: The format is learnable by a practitioner in under a day.
    grade: aspirational
    certainty: deferred

plan:
  status: stable-for-now
  approach: hold structure; evolve procedural primitives as examples
    surface them
