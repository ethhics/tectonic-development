# spec: tectonic/spec-format
kind: feature
status: proposed
parent: tectonic/methodology
provenance:
  - survey of existing spec formats
publishes:
  - tectonic/spec-format-reference (v0)

intent:
  - claim: A specification format exists that partitions spec content
      into plates — intent, context, constraints, verification, plan —
      each governed by a distinct force and each with its own rate of change,
      owners, and failure modes.

  - claim: The format records epistemic status inside every plate,
      so that authors are never forced to portray false confidence where there is uncertainty.

  - claim: The format composes specs across multiple kinds of relationship,
      with changes propagating in graded form
      so the blast radius of a change matches the kind of relationship it traveled through.

  - claim: The format admits thin specs.
      The smallest legal spec is four lines.

context:
  - fact: Spec content responds to different forces.
      Why a system exists shifts when stakeholders rethink the goal.
      The world around a system shifts independently of the system.
      Commitments shift by deliberate decision.
      Measurement of success shifts as measurement infrastructure catches up.
      The current working approach shifts constantly.
      Putting all these types of content into one undifferentiated spec document
      forces them to share an ownership model, a change cadence,
      and a review treatment they do not actually share.
    guaranteed_by: external:practice-experience
    enforcement: none
    note:
      kind: limitation
      detail: This is the load-bearing premise of the format.
        If it turns out that our partition of spec content does not reflect reality,
        and that some types of content do move together and have the same ownership,
        then our partitioned specs are just ceremonial, and therefore worthless.
        The methodology's verification of the format against real-world examples
        is the path by which we continually confirm this premise.
      review: on each format revision

  - fact: Specs persist beyond their authors,
      the immediate problems that produced them,
      and often the people now reading them.
      A spec that cannot age honestly turns into either a lie or a stale artifact.
    guaranteed_by: external:industry-practice
    enforcement: none

constraints:
  local:
    - directive: Every structural addition to the format must be justified
        by a real failure mode in a real example, not by anticipated need.
      note:
        kind: trade-off
        detail: This reactive approach means going through growing pains
          that could have been avoided with extra planning and thought,
          but we all must heed the call of Worse Is Better.

    - directive: The format must distinguish structural content (what a spec contains)
        from procedural content (what happens between specs over time).
        Procedural primitives are explicit when named.

    - directive: Each plate must represent a force genuinely distinct from the others.
        A proposal to add, merge, or remove plates must demonstrate the distinction, or lack thereof,
        in rate of change, ownership, and/or failure modes.

    - directive: The format must let authors record uncertainty
        inside the plate where the uncertain content belongs,
        so epistemic status never forces content into the wrong plate.

    - directive: Misplacement of content into the wrong plate is a structural error, not a stylistic preference.
        The format must keep the plate-distinction sharp enough that misplacement can be flagged in review.

verification:
  - claim: The format is validated against meaningfully different examples as the format evolves —
      different kinds of specs, different composition patterns, different failure modes.
    grade: reviewable
    review: on each new stress-test example

  - claim: Every field in the format earns its place
      by resolving a failure mode some earlier version couldn't express.
    grade: reviewable
    review: on each format revision

  - claim: Every procedural primitive in the format is explicitly named and categorized as procedural,
      not embedded in a structural plate.
    grade: reviewable
    review: on each format revision

  - claim: The format is learnable by a practitioner in under a day.
    grade: aspirational
    certainty: deferred
    note:
      kind: deferred-decision
      detail: Promotes to reviewable when training materials exist
        and have been used enough to observe typical onboarding time.

plan:
  status: stable-for-now
  approach: hold structure; evolve procedural primitives as examples surface them
