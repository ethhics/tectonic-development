# spec: tectonic/methodology
kind: feature
status: active
provenance:
  - Review of The Agile Manifesto in 2026; asking how its creators would write it now

intent:
  - claim: Teams using Tectonic create specs that are load-bearing,
      easy to evaluate, and which will age well as artifacts.

  - claim: AI-generated code implementing Tectonic specs is reliable,
      reviewable, and maintainable at scale.

context:
  - fact: AI coding agents are becoming the dominant generators of software.
    guaranteed_by: external:industry-state
    enforcement: none
    note:
      kind: limitation
      detail: If the generator/reviewer relationship inverts again,
        having humans regain the generator role,
        or having agents which may not need external review,
        then the Tectonic method is called into question.
      review: annually

  - fact: Current AI agents confabulate confidently when uncertain.
    guaranteed_by: external:current-agent-capabilities
    enforcement: none
    note:
      kind: limitation
      detail: It is possible that a wholly new class of model can void this fact,
        and necessitate a complete review of our methodology.
      review: annually

constraints:
  local:
    - directive: Each claim in the methodology must be stated
        sharply enough that it can be wrong.

    - directive: The methodology must not accrete ceremony.
        Every primitive must earn its place by solving a problem
        that comments or convention could not.

    - directive: The methodology references external traditions
        (ADRs, RFCs, formal methods) rather than replacing them.

    - directive: The methodology must not assert what it hasn't shown.
        Aspirations, deferred decisions, and unenforced assumptions
        are marked, not implied.

    - directive: The methodology must not invest in longevity at the
        expense of present usefulness.
      note:
        kind: trade-off
        detail: We are optimizing for the moment instead of
          optimizing for durability. We can not forecast the landscape
          2 years from now, so we will not bother trying to invent a tool for it.

verification:
  - grade: reviewable
    claim: Reviewers evaluate specs authored under Tectonic against their intent,
      without first reading implementation code.
    review: when a team has used the methodology for ≥3 months

  - claim: Generation and modification artifacts produced under Tectonic
      reference the specs they implement;
      specs are not bypassed in practice.
    grade: reviewable
    review: quarterly, on a sample of recent generation/modification records

  - claim: Generated code under Tectonic is reviewable against its
      spec without recourse to other artifacts.
    grade: reviewable
    review: when a team has used the methodology for ≥3 months

  - claim: Specs authored under Tectonic age into maintained assets
      rather than stale artifacts.
    grade: aspirational
    certainty: deferred
    note:
      kind: deferred-decision
      detail: No measurement framework exists yet; the open question
        is whether specs remain useful 12-24 months after authoring
        without rewrite.
      review: when the first specs reach 12 months in real use

  - claim: AI-generated code under Tectonic produces fewer defects
      than unstructured prompting at the same scale of work.
    grade: aspirational
    certainty: deferred
    note:
      kind: deferred-decision
      detail: No measurement framework exists yet. Asserting this
        without instrumentation would be exactly the overclaim the
        methodology warns against.
      review: when measurement infrastructure exists or is decided against

  - claim: Specs and code under Tectonic remain coherent as the
      codebase grows; spec changes propagate without ad-hoc rewrites.
    grade: aspirational
    certainty: deferred
    note:
      kind: deferred-decision
      detail: The maintainability claim is currently the fuzziest of
        the three code dimensions. Sharpen the claim or accept it as
        directional once a long-running Tectonic codebase exists.
      review: when a Tectonic codebase reaches 12 months

plan:
  status: ongoing
  approach: iterate the methodology against real examples
  next: revise the methodology as we get more feedback
